<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Little Loops</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-6);
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-10);
      box-shadow: var(--shadow-lg);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .auth-logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto var(--space-4);
      box-shadow: var(--shadow-glow);
    }
    .auth-logo h2 { font-size: var(--text-2xl); }
    .auth-logo p { font-size: var(--text-sm); color: var(--text-muted); margin-top: var(--space-2); }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-6) 0;
      color: var(--text-muted);
      font-size: var(--text-sm);
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    .social-btn {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-weight: 600;
      font-size: var(--text-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-3);
      transition: all var(--transition-base);
      margin-bottom: var(--space-3);
    }
    .social-btn:hover {
      border-color: var(--accent-primary);
      background: var(--bg-card-hover);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-sm);
      color: var(--text-muted);
    }
    .auth-footer a { color: var(--accent-primary); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">🧸</div>
        <h2>Welcome Back!</h2>
        <p>Log in to your Little Loops account</p>
      </div>
      <button class="social-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <button class="social-btn">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
        Continue with Facebook
      </button>
      <div class="auth-divider">or</div>
      <form onsubmit="alert('Welcome back!'); return false;">
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="your@email.com" required></div>
        <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="••••••••" required></div>
        <div class="flex justify-between items-center mb-6">
          <label style="display:flex; align-items:center; gap:var(--space-2); font-size:var(--text-sm); color:var(--text-secondary); cursor:pointer;"><input type="checkbox" style="accent-color:var(--accent-primary);"> Remember me</label>
          <a href="#" style="font-size:var(--text-sm); color:var(--accent-primary);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full">Log In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </div>
    </div>
  </div>
</body>
</html>
