<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — ReShop</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    .auth-layout {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-6);
      background: radial-gradient(circle at top right, rgba(16, 185, 129, 0.05), transparent 40%),
                  radial-gradient(circle at bottom left, rgba(99, 102, 241, 0.05), transparent 40%);
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-10);
      box-shadow: var(--shadow-lg);
    }
    .social-auth {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      color: var(--text-primary);
      transition: all var(--transition-fast);
    }
    .social-btn:hover { background: var(--bg-secondary); }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
      color: var(--text-muted);
      font-size: var(--text-xs);
      text-transform: uppercase;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    .auth-footer {
      margin-top: var(--space-8);
      text-align: center;
      font-size: var(--text-sm);
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--accent-primary);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="auth-layout">
    <div class="auth-card">
      <div class="text-center mb-10">
        <a href="index.html" class="nav-logo justify-center">
          <div class="nav-logo-icon">🛒</div>
          <span>ReShop</span>
        </a>
        <h1 class="text-xl mt-4">Create your account</h1>
        <p class="text-sm text-muted mt-2">Join thousands of smart buyers and sellers</p>
      </div>

      <div class="social-auth">
        <button class="social-btn"><span>G</span> Google</button>
        <button class="social-btn"><span>F</span> Facebook</button>
      </div>

      <div class="auth-divider">Or continue with email</div>

      <!-- Signup Form -->
      <form id="signupForm" onsubmit="alert('Registered!'); window.location.href='dashboard.html'; return false;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="••••••••" required>
        </div>
        <p class="text-xs text-muted mb-6">By signing up, you agree to our <a href="#" class="text-accent">Terms</a> and <a href="#" class="text-accent">Privacy Policy</a>.</p>
        <button type="submit" class="btn btn-primary w-full btn-lg">Create Account 🚀</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script src="nav.js"></script>
</body>
</html>
