<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Little Loops</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="nav.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-6);
      background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
    }
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: var(--space-10);
      box-shadow: var(--shadow-lg);
    }
    .auth-logo { text-align: center; margin-bottom: var(--space-8); }
    .auth-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-1);
      text-decoration: none;
      margin-bottom: var(--space-6);
      transition: transform var(--transition-base);
    }
    .auth-brand:hover {
      transform: translateY(-2px);
    }
    .auth-brand-name {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .auth-logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-warm));
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin: 0;
      box-shadow: var(--shadow-glow);
    }
    .auth-logo h2 { font-size: var(--text-2xl); margin-top: var(--space-2); }
    .auth-logo p { font-size: var(--text-sm); color: var(--text-muted); margin-top: var(--space-1); }
    .auth-divider {
      display: flex; align-items: center; gap: var(--space-4); margin: var(--space-6) 0;
      color: var(--text-muted); font-size: var(--text-sm);
    }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
    .social-btn {
      width: 100%; padding: var(--space-3) var(--space-4);
      background: var(--bg-secondary); border: 2px solid var(--border-color);
      border-radius: var(--radius-md); color: var(--text-primary);
      font-weight: 600; font-size: var(--text-sm);
      display: flex; align-items: center; justify-content: center; gap: var(--space-3);
      transition: all var(--transition-base); margin-bottom: var(--space-3);
    }
    .social-btn:hover {
      border-color: var(--accent-primary);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
    }
    .social-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .social-btn-compact {
      flex-direction: column;
      padding: var(--space-3) var(--space-2);
      font-size: var(--text-xs);
      gap: var(--space-1);
      margin-bottom: 0;
    }
    .social-btn-compact svg {
      width: 24px;
      height: 24px;
    }
    .auth-footer { text-align: center; margin-top: var(--space-6); font-size: var(--text-sm); color: var(--text-muted); }
    .auth-footer a { color: var(--accent-primary); font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .perk-list { margin-top: var(--space-4); }
    .perk-list li { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-2); }
  </style>
</head>
<body>
  <div class="auth-nav">
    <button id="themeToggleNav" class="nav-icon-btn" title="Toggle Theme">🌞</button>
    <button id="rtlToggleNav" class="nav-icon-btn" title="Toggle RTL">RTL</button>
  </div>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="auth-brand">
          <div class="auth-logo-icon">🧸</div>
          <span class="auth-brand-name">Little Loops</span>
        </a>
        <h2>Join Little Loops</h2>
        <p>Join 10,000+ families saving on kids' stuff</p>
      </div>
      <div class="social-grid">
        <button class="social-btn social-btn-compact">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="social-btn social-btn-compact">
          <svg width="20" height="20" fill="#1877F2" viewBox="0 0 24 24"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"/></svg>
          Facebook
        </button>
        <button class="social-btn social-btn-compact">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z"/></svg>
          Apple
        </button>
      </div>
      <div class="auth-divider">or sign up with email</div>
      <form onsubmit="alert('Welcome to Little Loops! 🎉'); return false;">
        <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" placeholder="Jessica" required></div>
        <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" placeholder="Miller" required></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" placeholder="jessica@email.com" required></div>
        <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="At least 8 characters" required></div>
        <div class="form-group">
          <label style="display:flex; align-items:flex-start; gap:var(--space-2); font-size:var(--text-sm); color:var(--text-secondary); cursor:pointer;">
            <input type="checkbox" style="accent-color:var(--accent-primary); margin-top:3px;" required>
            I agree to the <a href="#" style="color:var(--accent-primary);">Terms of Service</a> and <a href="#" style="color:var(--accent-primary);">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full">Create Free Account</button>
      </form>
      <ul class="perk-list">
        <li>✅ Free to join — no listing fees</li>
        <li>🛡️ Buyer protection on every purchase</li>
        <li>💰 Start selling in under 2 minutes</li>
      </ul>
      <div class="auth-footer">Already have an account? <a href="login.html">Log in</a></div>
    </div>
  </div>
  <script src="nav.js"></script>
</body>
</html>
